<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Tap Sphere | 敲击音助眠</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #e0e0f0;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* === 3D 画布 === */
    #canvas3d {
      position: absolute;
      inset: 0;
      cursor: crosshair;
    }

    /* === 顶部 HUD === */
    .hud-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      text-align: center;
      padding: 12px 16px;
      background: linear-gradient(to bottom, rgba(10,10,26,0.9), transparent);
      pointer-events: none;
      z-index: 10;
    }
    .hud-top h1 {
      font-size: 1.2em;
      font-weight: 300;
      letter-spacing: 4px;
      color: #8080b0;
    }
    .hud-top .hint {
      font-size: 0.7em;
      color: #505070;
      margin-top: 4px;
    }

    /* === 区域信息（悬停时显示）=== */
    .region-info {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 50, 0.85);
      border: 1px solid rgba(100, 120, 255, 0.3);
      border-radius: 12px;
      padding: 8px 16px;
      text-align: center;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      backdrop-filter: blur(8px);
    }
    .region-info.visible { opacity: 1; }
    .region-info .name { font-size: 1em; color: #b0c0ff; }
    .region-info .desc { font-size: 0.7em; color: #607080; margin-top: 2px; }

    /* === 材料栏 === */
    .materials-bar {
      position: absolute;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
      background: rgba(10, 10, 30, 0.7);
      padding: 8px 12px;
      border-radius: 16px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .mat-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 6px 10px;
      color: #808090;
      font-size: 0.75em;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 48px;
    }
    .mat-btn.active {
      background: rgba(100, 120, 255, 0.15);
      border-color: rgba(100, 120, 255, 0.4);
      color: #b0c0ff;
    }
    .mat-btn .emoji { font-size: 1.2em; }

    /* === 底部控制 === */
    .controls-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 12px 20px 20px;
      background: linear-gradient(to top, rgba(10,10,26,0.95), transparent);
      z-index: 10;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .control-label {
      font-size: 0.7em;
      color: #506080;
      min-width: 40px;
      text-align: right;
    }
    .control-row input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      outline: none;
    }
    .control-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #5060a0;
      cursor: pointer;
    }
    .control-value {
      font-size: 0.7em;
      color: #607080;
      min-width: 32px;
    }

    /* === 模式切换 === */
    .mode-bar {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .mode-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 5px 14px;
      color: #707080;
      font-size: 0.7em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: rgba(100, 200, 150, 0.12);
      border-color: rgba(100, 200, 150, 0.3);
      color: #a0e0c0;
    }

    /* === 敲击计数 === */
    .tap-counter {
      position: absolute;
      top: 60px;
      right: 16px;
      font-size: 0.65em;
      color: #404060;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <canvas id="canvas3d"></canvas>

  <!-- HUD -->
  <div class="hud-top">
    <h1>Tap Sphere</h1>
    <div class="hint">拖拽旋转 · 点击敲击 · 滚轮缩放</div>
  </div>

  <!-- 区域信息 -->
  <div class="region-info" id="regionInfo">
    <div class="name" id="regionName"></div>
    <div class="desc" id="regionDesc"></div>
  </div>

  <!-- 敲击计数 -->
  <div class="tap-counter" id="tapCounter"></div>

  <!-- 材料栏 -->
  <div class="materials-bar" id="materialsBar"></div>

  <!-- 模式切换 -->
  <div class="mode-bar">
    <button class="mode-btn active" data-mode="manual">手动</button>
    <button class="mode-btn" data-mode="random">随机</button>
  </div>

  <!-- 底部控制 -->
  <div class="controls-bar">
    <div class="control-row">
      <span class="control-label">音量</span>
      <input type="range" id="volumeSlider" min="0" max="100" value="70">
      <span class="control-value" id="volumeVal">70%</span>
    </div>
    <div class="control-row" id="velocityRow">
      <span class="control-label">力度</span>
      <input type="range" id="velocitySlider" min="10" max="100" value="70">
      <span class="control-value" id="velocityVal">70%</span>
    </div>
    <div class="control-row" id="bpmRow" style="display:none;">
      <span class="control-label">节奏</span>
      <input type="range" id="bpmSlider" min="20" max="120" value="50">
      <span class="control-value" id="bpmVal">50</span>
    </div>
  </div>

  <!-- 引擎 -->
  <script src="engine/presets.js"></script>
  <script src="engine/regions.js"></script>
  <script src="engine/material.js"></script>
  <script src="engine/rhythm.js"></script>

  <!-- importmap: 让裸模块 'three' 指向本地文件 -->
  <script type="importmap">
  {
    "imports": {
      "three": "./lib/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from './lib/three.module.js';
    import { OrbitControls } from './lib/OrbitControls.js';

    // ==================== 状态 ====================
    const state = {
      material: 'wood',
      mode: 'manual',
      velocity: 0.7,
      bpm: 50,
      tapCount: 0,
      hoveredRegion: null
    };

    const synth = new MaterialSynth();
    const rhythm = new RhythmEngine();

    // ==================== Three.js 场景 ====================
    const canvas = document.getElementById('canvas3d');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.3, 3);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 1.5;
    controls.maxDistance = 6;
    controls.enablePan = false;

    // ==================== 灯光 ====================
    const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
    mainLight.position.set(2, 3, 4);
    scene.add(mainLight);

    const fillLight = new THREE.DirectionalLight(0x6080ff, 0.3);
    fillLight.position.set(-2, 1, -2);
    scene.add(fillLight);

    // ==================== 头部模型 ====================
    // 用参数化几何体构建头部（MVP 阶段）
    // 后续可替换为 GLB 模型

    const headGroup = new THREE.Group();
    scene.add(headGroup);

    // 头部主体（椭球体）
    const headGeo = new THREE.SphereGeometry(1, 64, 48);
    headGeo.scale(0.85, 1.0, 0.9); // 略微椭圆
    const headMat = new THREE.MeshStandardMaterial({
      color: 0xd4a574,
      roughness: 0.7,
      metalness: 0.05,
    });
    const headMesh = new THREE.Mesh(headGeo, headMat);
    headGroup.add(headMesh);

    // 区域高亮层（半透明，悬停时显示）
    const highlightGeo = new THREE.SphereGeometry(1.005, 64, 48);
    highlightGeo.scale(0.85, 1.0, 0.9);
    const highlightMat = new THREE.MeshBasicMaterial({
      color: 0x6080ff,
      transparent: true,
      opacity: 0,
      depthWrite: false,
    });
    const highlightMesh = new THREE.Mesh(highlightGeo, highlightMat);
    headGroup.add(highlightMesh);

    // 耳朵（简单椭球）
    const earGeo = new THREE.SphereGeometry(0.18, 16, 12);
    earGeo.scale(0.5, 1.2, 0.8);
    const earMat = new THREE.MeshStandardMaterial({ color: 0xc49064, roughness: 0.8 });
    
    const earL = new THREE.Mesh(earGeo, earMat);
    earL.position.set(-0.85, 0.1, 0);
    earL.rotation.z = 0.2;
    headGroup.add(earL);
    
    const earR = new THREE.Mesh(earGeo, earMat);
    earR.position.set(0.85, 0.1, 0);
    earR.rotation.z = -0.2;
    headGroup.add(earR);

    // 鼻子
    const noseGeo = new THREE.ConeGeometry(0.08, 0.25, 8);
    noseGeo.rotateX(-Math.PI / 2);
    const noseMat = new THREE.MeshStandardMaterial({ color: 0xc49064, roughness: 0.8 });
    const nose = new THREE.Mesh(noseGeo, noseMat);
    nose.position.set(0, -0.05, 0.88);
    headGroup.add(nose);

    // 眼睛（半球）
    const eyeGeo = new THREE.SphereGeometry(0.08, 16, 8);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.3 });
    const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
    eyeL.position.set(-0.25, 0.2, 0.82);
    headGroup.add(eyeL);
    const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
    eyeR.position.set(0.25, 0.2, 0.82);
    headGroup.add(eyeR);

    // ==================== 敲击点标记 ====================
    const tapMarkers = [];
    const markerGeo = new THREE.SphereGeometry(0.03, 12, 8);

    function addTapMarker(position, color) {
      const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.8 });
      const marker = new THREE.Mesh(markerGeo, mat);
      marker.position.copy(position);
      // 稍微抬离表面
      marker.position.multiplyScalar(1.01);
      headGroup.add(marker);
      tapMarkers.push(marker);

      // 淡出动画
      const startTime = performance.now();
      function fadeOut() {
        const elapsed = (performance.now() - startTime) / 2000;
        if (elapsed >= 1) {
          headGroup.remove(marker);
          const idx = tapMarkers.indexOf(marker);
          if (idx >= 0) tapMarkers.splice(idx, 1);
          return;
        }
        mat.opacity = 0.8 * (1 - elapsed);
        marker.scale.setScalar(1 + elapsed * 2);
        requestAnimationFrame(fadeOut);
      }
      fadeOut();
    }

    // ==================== 射线检测 ====================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function getIntersection(event) {
      const rect = canvas.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      return raycaster.intersectObject(headMesh);
    }

    // ==================== 事件处理 ====================
    let isPointerDown = false;
    let pointerMoved = false;

    canvas.addEventListener('pointerdown', (e) => {
      isPointerDown = true;
      pointerMoved = false;
    });

    canvas.addEventListener('pointermove', (e) => {
      pointerMoved = true;
      
      // 悬停显示区域
      const hits = getIntersection(e);
      const regionInfo = document.getElementById('regionInfo');
      const regionName = document.getElementById('regionName');
      const regionDesc = document.getElementById('regionDesc');
      
      if (hits.length > 0) {
        const regionKey = getRegionFromPosition(hits[0].point);
        const region = HEAD_REGIONS[regionKey];
        
        if (state.hoveredRegion !== regionKey) {
          state.hoveredRegion = regionKey;
          regionName.textContent = `${region.emoji} ${region.name}`;
          regionDesc.textContent = region.description;
          highlightMat.color.set(region.color);
        }
        
        highlightMat.opacity = 0.15;
        regionInfo.classList.add('visible');
      } else {
        state.hoveredRegion = null;
        highlightMat.opacity = 0;
        regionInfo.classList.remove('visible');
      }
    });

    canvas.addEventListener('pointerup', async (e) => {
      if (!isPointerDown) return;
      isPointerDown = false;
      
      // 忽略拖拽旋转
      if (pointerMoved && controls.isDragging) return;

      await initAudio();

      const hits = getIntersection(e);
      if (hits.length > 0 && state.mode === 'manual') {
        const point = hits[0].point;
        const regionKey = getRegionFromPosition(point);
        const region = HEAD_REGIONS[regionKey];
        
        // 立体声：基于 x 位置
        const stereoPan = point.x * 0.8;
        
        // 播放声音
        synth.play(state.material, state.velocity, region, stereoPan);
        
        // 视觉反馈
        const regionColor = new THREE.Color(region.color);
        addTapMarker(point, regionColor);
        
        state.tapCount++;
        updateTapCounter();
        
        // 更新区域信息
        document.getElementById('regionName').textContent = `${region.emoji} ${region.name}`;
        document.getElementById('regionDesc').textContent = 
          `${region.description} · 第 ${state.tapCount} 次`;
      }
    });

    // ==================== 材料 UI ====================
    function renderMaterials() {
      const bar = document.getElementById('materialsBar');
      const materials = synth.getMaterials();
      bar.innerHTML = materials.map(m => `
        <button class="mat-btn ${m.key === state.material ? 'active' : ''}" data-mat="${m.key}">
          <span class="emoji">${m.emoji}</span>
          <span>${m.name}</span>
        </button>
      `).join('');
      
      bar.querySelectorAll('.mat-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          await initAudio();
          state.material = btn.dataset.mat;
          renderMaterials();
          synth.play(state.material, 0.5, 
            HEAD_REGIONS.forehead, 0);
        });
      });
    }

    // ==================== 模式切换 ====================
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        await initAudio();
        state.mode = btn.dataset.mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const bpmRow = document.getElementById('bpmRow');
        const velocityRow = document.getElementById('velocityRow');

        if (state.mode === 'random') {
          bpmRow.style.display = 'flex';
          velocityRow.style.display = 'none';
          rhythm.setMode('random');
          rhythm.setBPM(state.bpm);
          rhythm.startRandom((vel, pos) => {
            // 随机选择一个区域
            const regionKeys = Object.keys(HEAD_REGIONS);
            const regionKey = regionKeys[Math.floor(Math.random() * regionKeys.length)];
            const region = HEAD_REGIONS[regionKey];
            synth.play(state.material, vel, region, (Math.random()-0.5)*1.6);
            
            // 随机位置标记
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(Math.random() * 2 - 1);
            const r = 0.85;
            addTapMarker(new THREE.Vector3(
              r * Math.sin(phi) * Math.cos(theta),
              r * Math.cos(phi),
              r * Math.sin(phi) * Math.sin(theta)
            ), new THREE.Color(region.color));
            
            state.tapCount++;
            updateTapCounter();
          });
        } else {
          bpmRow.style.display = 'none';
          velocityRow.style.display = 'flex';
          rhythm.stop();
        }
      });
    });

    // ==================== 控制条 ====================
    document.getElementById('volumeSlider').addEventListener('input', (e) => {
      synth.setVolume(e.target.value / 100);
      document.getElementById('volumeVal').textContent = e.target.value + '%';
    });

    document.getElementById('velocitySlider').addEventListener('input', (e) => {
      state.velocity = e.target.value / 100;
      document.getElementById('velocityVal').textContent = e.target.value + '%';
    });

    document.getElementById('bpmSlider').addEventListener('input', (e) => {
      state.bpm = parseInt(e.target.value);
      document.getElementById('bpmVal').textContent = e.target.value;
      rhythm.setBPM(state.bpm);
    });

    // ==================== 工具函数 ====================
    async function initAudio() {
      if (!synth.isInitialized) {
        await synth.init();
      }
    }

    function updateTapCounter() {
      document.getElementById('tapCounter').textContent = `第 ${state.tapCount} 次敲击`;
    }

    // ==================== 渲染循环 ====================
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      
      // 头部缓慢旋转（空闲时）
      if (!controls.isDragging) {
        headGroup.rotation.y += 0.001;
      }
      
      renderer.render(scene, camera);
    }

    // ==================== 窗口尺寸 ====================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ==================== 启动 ====================
    renderMaterials();
    animate();
    console.log('[TapSphere] 3D mode ready. Click on the head to tap!');
  </script>
</body>
</html>
